<title>Mi Auto Bien - Reservas</title>

<style>
html, body{
margin:0;
padding:0;
height:100%;
font-family: Arial, Helvetica, sans-serif;
}

.booking-frame{
position:absolute;
top:0;
left:0;
right:0;
bottom:50px;
}

.booking-frame iframe{
border:none;
width:100%;
height:100%;
}

.legal-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
color:#fff;
text-align:center;
padding:12px 10px;
font-size:14px;
box-sizing:border-box;
}

.legal-bar a{
color:#ffd54f;
text-decoration:none;
margin:0 8px;
font-weight:600;
}

.legal-bar a:hover{
text-decoration:underline;
}
</style>
</head>

<body>

<div class="booking-frame">

</div>
